<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B0C12">
<title>Chakr Chat | دردشة فيديو عشوائية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0C12; --ink-2:#15161F;
    --signal:#E8A855; --signal-deep:#B8792C; --signal-text:#1A1206;
    --live:#3ECF8E; --stop:#E15B4F; --stop-deep:#B8453B;
    --paper:#EDEEF2; --paper-dim:#8A8F9E;
    --glass:rgba(255,255,255,0.06); --glass-border:rgba(255,255,255,0.13);
    --r-lg:28px; --r-md:16px; --r-full:999px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--ink);color:var(--paper);
    font-family:'IBM Plex Sans Arabic','Segoe UI',Tahoma,sans-serif;}
  .kufi{font-family:'Reem Kufi','IBM Plex Sans Arabic',sans-serif;}

  .app{position:relative;height:100dvh;width:100%;display:flex;flex-direction:column;overflow:hidden;
    animation:appIn .5s cubic-bezier(.4,0,.2,1);}
  @keyframes appIn{from{opacity:0;transform:scale(.97);}to{opacity:1;transform:scale(1);}}

  @media (min-width:860px){
    body{display:flex;align-items:center;justify-content:center;
      background:radial-gradient(circle at 30% 20%, #17151f 0%, #07080c 70%);}
    .app{width:420px;height:880px;max-height:92vh;border-radius:40px;
      box-shadow:0 30px 90px rgba(0,0,0,0.65), 0 0 0 8px #05060a;overflow:hidden;}
  }

  .topbar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;
    justify-content:space-between;padding:18px 20px;padding-top:max(18px, env(safe-area-inset-top));
    background:linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);}
  .brand{display:flex;align-items:center;gap:8px;font-size:18.5px;font-weight:700;letter-spacing:.2px;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--signal);box-shadow:0 0 10px var(--signal);}
  .brand-chakr{color:var(--paper);}
  .brand-chat{color:var(--signal);}

  .topbar-right{display:flex;align-items:center;gap:8px;}

  .status-pill{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:500;color:var(--paper-dim);
    background:var(--glass);border:1px solid var(--glass-border);padding:6px 13px;border-radius:var(--r-full);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
  .status-pill .led{width:7px;height:7px;border-radius:50%;background:#5b6070;transition:.3s;}
  .status-pill.searching .led{background:var(--signal);box-shadow:0 0 8px var(--signal);animation:dotPulse 1.4s ease-in-out infinite;}
  .status-pill.live .led{background:var(--live);box-shadow:0 0 8px var(--live);}
  @keyframes dotPulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  .menu-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--glass-border);background:var(--glass);
    color:var(--paper);display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
  .menu-btn svg{width:16px;height:16px;}
  .menu-dropdown{position:absolute;top:58px;left:20px;z-index:30;background:rgba(15,16,24,0.97);
    border:1px solid var(--glass-border);border-radius:14px;overflow:hidden;min-width:160px;
    box-shadow:0 12px 30px rgba(0,0,0,0.5);display:none;}
  .menu-dropdown.open{display:block;}
  .menu-dropdown button{width:100%;padding:13px 16px;background:none;border:none;color:var(--paper);
    font-family:inherit;font-size:13.5px;display:flex;align-items:center;gap:8px;}
  .menu-dropdown button:active{background:rgba(255,255,255,0.07);}
  .menu-dropdown button.danger{color:#f3a9a1;}
  .menu-dropdown hr{border:none;border-top:1px solid var(--glass-border);}

  .toast{position:absolute;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:40;
    background:rgba(15,16,24,0.96);border:1px solid var(--glass-border);color:var(--paper);
    padding:10px 18px;border-radius:var(--r-full);font-size:13px;opacity:0;pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;white-space:nowrap;max-width:88%;overflow:hidden;text-overflow:ellipsis;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .stage{position:relative;flex:1;background:var(--ink);overflow:hidden;}
  video{display:block;}

  .remote-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:var(--ink);}

  .local-video{position:absolute;width:104px;height:148px;left:16px;top:82px;object-fit:cover;
    border-radius:var(--r-md);border:2px solid rgba(255,255,255,0.22);box-shadow:0 8px 24px rgba(0,0,0,0.45);
    transform:scaleX(-1);z-index:15;background:var(--ink-2);
    transition:width .35s cubic-bezier(.4,0,.2,1), height .35s cubic-bezier(.4,0,.2,1),
      left .35s ease, top .35s ease, border-radius .35s ease;}

  .stage.swapped .remote-video{position:absolute;width:104px;height:148px;left:16px;top:82px;inset:auto;
    border-radius:var(--r-md);border:2px solid rgba(255,255,255,0.22);box-shadow:0 8px 24px rgba(0,0,0,0.45);z-index:15;}
  .stage.swapped .local-video{position:absolute;inset:0;width:100%;height:100%;left:0;top:0;
    border-radius:0;border:none;box-shadow:none;z-index:5;}

  .waiting-overlay{position:absolute;inset:0;z-index:10;display:flex;align-items:center;
    justify-content:center;text-align:center;padding:0 32px;background:var(--ink);
    transition:opacity .4s ease, visibility .4s ease;}
  .waiting-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none;}

  .idle-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:24px;}

  .ambient{position:absolute;width:260px;height:260px;border-radius:50%;
    background:radial-gradient(circle, rgba(232,168,85,0.16), transparent 70%);
    filter:blur(14px);top:16%;right:8%;z-index:0;pointer-events:none;
    animation:drift 16s ease-in-out infinite alternate;}
  @keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(-24px,26px) scale(1.12);}}

  .credit{margin-top:-8px;font-size:11.5px;color:var(--paper-dim);opacity:.8;}
  .credit span{color:var(--signal);font-weight:600;}

  .beacon{position:relative;width:140px;height:140px;display:flex;align-items:center;justify-content:center;}
  .tick-ring{position:absolute;inset:0;animation:spin 44s linear infinite;}
  .pulse-ring{position:absolute;width:62px;height:62px;border-radius:50%;border:1.5px solid var(--signal);
    animation:ping 2.6s ease-out infinite;}
  .pulse-ring.r2{animation-delay:1.3s;}
  .beacon-core{width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--signal), var(--signal-deep));
    box-shadow:0 0 32px rgba(232,168,85,0.5), 0 0 64px rgba(232,168,85,0.22);}
  @keyframes ping{0%{transform:scale(.7);opacity:.85;}100%{transform:scale(2.2);opacity:0;}}
  @keyframes spin{to{transform:rotate(360deg);}}

  .status-text{font-size:25px;font-weight:400;color:var(--paper);}
  .status-sub{font-size:13.5px;color:var(--paper-dim);margin-top:-14px;}

  .idle-start{margin-top:4px;padding:15px 44px;border:none;border-radius:var(--r-full);
    font-family:inherit;font-size:15.5px;font-weight:600;color:var(--signal-text);
    background:linear-gradient(135deg, var(--signal), var(--signal-deep));
    box-shadow:0 12px 28px rgba(184,121,44,0.35);display:flex;align-items:center;gap:9px;}
  .idle-start:active{transform:scale(.96);}

  .fab-chat{position:absolute;left:16px;bottom:96px;z-index:16;width:48px;height:48px;border-radius:50%;
    border:1px solid var(--glass-border);background:var(--glass);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    color:var(--paper);display:flex;align-items:center;justify-content:center;}
  .fab-chat svg{width:20px;height:20px;}
  .fab-chat:active{transform:scale(.9);}
  .fab-chat .badge{position:absolute;top:-2px;left:-2px;width:11px;height:11px;border-radius:50%;
    background:var(--stop);border:2px solid var(--ink);display:none;}
  .fab-chat.unread .badge{display:block;}

  .chat-panel{position:absolute;left:0;right:0;bottom:0;z-index:25;height:54%;
    background:rgba(10,11,17,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-radius:24px 24px 0 0;border-top:1px solid var(--glass-border);
    display:flex;flex-direction:column;transform:translateY(100%);
    transition:transform .3s cubic-bezier(.4,0,.2,1);}
  .chat-panel.open{transform:translateY(0);}
  .chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
    border-bottom:1px solid var(--glass-border);font-weight:600;font-size:14.5px;}
  .chat-header button{background:none;border:none;color:var(--paper-dim);font-size:18px;padding:4px;}
  .chat-log{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
  .msg{max-width:75%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.4;word-break:break-word;}
  .msg.self{align-self:flex-end;background:linear-gradient(135deg,var(--signal),var(--signal-deep));color:var(--signal-text);}
  .msg.other{align-self:flex-start;background:var(--glass);border:1px solid var(--glass-border);}
  .chat-input-row{display:flex;gap:8px;padding:12px 14px;padding-bottom:max(12px, env(safe-area-inset-bottom));
    border-top:1px solid var(--glass-border);}
  .chat-input-row input{flex:1;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r-full);
    padding:11px 16px;color:var(--paper);font-family:inherit;font-size:14px;min-width:0;}
  .chat-input-row input::placeholder{color:var(--paper-dim);}
  .chat-input-row button{width:42px;height:42px;border-radius:50%;border:none;
    background:linear-gradient(135deg,var(--signal),var(--signal-deep));color:var(--signal-text);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  .controls{position:absolute;left:0;right:0;bottom:0;z-index:20;display:flex;align-items:center;
    justify-content:center;gap:13px;padding:16px 20px;padding-bottom:max(20px, env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    transition:transform .3s ease, opacity .3s ease;}
  .controls.hidden{transform:translateY(120%);opacity:0;pointer-events:none;}

  .ctrl-btn{width:52px;height:52px;border-radius:50%;border:1px solid var(--glass-border);background:var(--glass);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:var(--paper);
    display:flex;align-items:center;justify-content:center;transition:transform .15s ease, background .2s ease;}
  .ctrl-btn svg{width:22px;height:22px;}
  .ctrl-btn:active{transform:scale(.9);}
  .ctrl-btn.off{background:rgba(225,91,79,0.22);border-color:rgba(225,91,79,0.5);color:#f3a9a1;}

  .ctrl-btn.next{width:auto;padding:0 22px;border-radius:var(--r-full);
    background:linear-gradient(135deg, var(--signal), var(--signal-deep));border:none;
    font-family:inherit;font-weight:600;font-size:14.5px;gap:8px;color:var(--signal-text);}
  .ctrl-btn.next svg{width:18px;height:18px;}

  .ctrl-btn.end{background:linear-gradient(135deg, var(--stop), var(--stop-deep));border:none;color:#fff;}

  button{cursor:pointer;}
  button:focus-visible{outline:2px solid var(--signal);outline-offset:3px;}

  .hidden-el{display:none !important;}
  ::-webkit-scrollbar{display:none;}

  @media (prefers-reduced-motion: reduce){
    .tick-ring, .pulse-ring, .status-pill.searching .led, .ambient, .app{animation:none !important;}
  }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="brand"><span class="dot"></span><span class="brand-chakr">Chakr</span>&nbsp;<span class="brand-chat">Chat</span></div>
    <div class="topbar-right">
      <div class="status-pill" id="statusPill"><span class="led" id="led"></span><span id="pillText">غير متصل</span></div>
      <button class="menu-btn hidden-el" id="menuBtn" aria-label="خيارات">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>
      </button>
    </div>
  </div>

  <div class="menu-dropdown" id="menuDropdown">
    <button id="reportBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V4s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="4"/></svg>
      إبلاغ
    </button>
    <hr>
    <button id="blockBtn" class="danger">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.9" y1="4.9" x2="19.1" y2="19.1"/></svg>
      حظر المستخدم
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <div class="stage" id="stage">
    <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
    <video id="localVideo" class="local-video hidden-el" autoplay playsinline muted title="دوس باش تبدل المكان"></video>

    <div class="waiting-overlay" id="waitingOverlay">
      <div class="ambient"></div>
      <div class="idle-content">
        <div class="beacon">
          <svg class="tick-ring" viewBox="0 0 140 140" width="140" height="140">
            <circle cx="70" cy="70" r="64" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="1.5" stroke-dasharray="2 8.4"/>
          </svg>
          <span class="pulse-ring"></span>
          <span class="pulse-ring r2"></span>
          <div class="beacon-core"></div>
        </div>
        <div>
          <div class="status-text kufi" id="statusText">جاهز؟</div>
          <div class="status-sub" id="statusSub">دوس بدأ ونقلبولك على حد نتسناوش</div>
        </div>
        <button class="idle-start" id="startBtn">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          ابدأ
        </button>
        <div class="credit">المطور <span>شاكر</span></div>
      </div>
    </div>

    <button class="fab-chat hidden-el" id="chatToggle" aria-label="الدردشة النصية">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span class="badge"></span>
    </button>

    <div class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <span>الدردشة</span>
        <button id="chatClose" aria-label="إغلاق">✕</button>
      </div>
      <div class="chat-log" id="chatLog"></div>
      <form class="chat-input-row" id="chatForm">
        <input type="text" id="chatInput" placeholder="اكتب رسالة..." maxlength="300" autocomplete="off">
        <button type="submit" aria-label="إرسال">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </form>
    </div>
  </div>

  <div class="controls hidden" id="controls">
    <button class="ctrl-btn" id="micBtn" aria-label="ميكروفون">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
    </button>
    <button class="ctrl-btn" id="camBtn" aria-label="كاميرا">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    </button>
    <button class="ctrl-btn next" id="nextBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      التالي
    </button>
    <button class="ctrl-btn end" id="endBtn" aria-label="إنهاء">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M21 16.5c0 .3-.06.6-.18.87a3.6 3.6 0 0 1-.53.85 3 3 0 0 1-.83.57 2.7 2.7 0 0 1-1 .21c-1.4 0-2.9-.34-4.4-1a15.6 15.6 0 0 1-4.3-3 15.6 15.6 0 0 1-3-4.3c-.66-1.5-1-3-1-4.4 0-.35.07-.7.2-1a2.8 2.8 0 0 1 .58-.83c.24-.24.53-.42.85-.53.27-.12.57-.18.87-.18h2a1 1 0 0 1 1 .8l.6 3a1 1 0 0 1-.27.9l-1.1 1.1a12 12 0 0 0 4.6 4.6l1.1-1.1a1 1 0 0 1 .9-.27l3 .6a1 1 0 0 1 .8 1v2z"/></svg>
    </button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const stage = document.getElementById('stage');
const remoteVideo = document.getElementById('remoteVideo');
const localVideo = document.getElementById('localVideo');
const waitingOverlay = document.getElementById('waitingOverlay');
const statusText = document.getElementById('statusText');
const statusSub = document.getElementById('statusSub');
const startBtn = document.getElementById('startBtn');
const controls = document.getElementById('controls');
const nextBtn = document.getElementById('nextBtn');
const endBtn = document.getElementById('endBtn');
const micBtn = document.getElementById('micBtn');
const camBtn = document.getElementById('camBtn');
const statusPill = document.getElementById('statusPill');
const pillText = document.getElementById('pillText');
const menuBtn = document.getElementById('menuBtn');
const menuDropdown = document.getElementById('menuDropdown');
const reportBtn = document.getElementById('reportBtn');
const blockBtn = document.getElementById('blockBtn');
const chatToggle = document.getElementById('chatToggle');
const chatPanel = document.getElementById('chatPanel');
const chatClose = document.getElementById('chatClose');
const chatLog = document.getElementById('chatLog');
const chatForm = document.getElementById('chatForm');
const chatInput = document.getElementById('chatInput');
const toastEl = document.getElementById('toast');

let localStream = null;
let peerConnection = null;
let isInitiator = false;
let micOn = true;
let camOn = true;
let toastTimer = null;

const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

// ---- persistent anonymous id (no accounts yet — used only for block-list + reports) ----
function getDeviceId(){
  let id = localStorage.getItem('wanis_device_id');
  if (!id){
    id = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : ('d-' + Date.now() + '-' + Math.random().toString(36).slice(2));
    localStorage.setItem('wanis_device_id', id);
  }
  return id;
}
const deviceId = getDeviceId();
socket.on('connect', () => socket.emit('identify', { deviceId }));

function setStatus(text, sub){ statusText.textContent = text; statusSub.textContent = sub || ''; }

function setPill(text, state){
  pillText.textContent = text;
  statusPill.classList.remove('searching','live');
  if (state) statusPill.classList.add(state);
}

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
}

function addMessage(text, self){
  const div = document.createElement('div');
  div.className = 'msg ' + (self ? 'self' : 'other');
  div.textContent = text;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function openChat(){ chatPanel.classList.add('open'); chatToggle.classList.remove('unread'); }
function closeChat(){ chatPanel.classList.remove('open'); }

async function startCamera(){
  try{
    localStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    localVideo.srcObject = localStream;
    localVideo.classList.remove('hidden-el');
    return true;
  }catch(err){
    setStatus('تعذر الوصول للكاميرا','خاصك تسمح بالكاميرا والميكروفون من إعدادات المتصفح');
    return false;
  }
}

function createPeerConnection(){
  peerConnection = new RTCPeerConnection(config);
  localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
  peerConnection.ontrack = (event) => { remoteVideo.srcObject = event.streams[0]; };
  peerConnection.onicecandidate = (event) => {
    if (event.candidate) socket.emit('signal', { type:'candidate', candidate:event.candidate });
  };
}

async function makeOffer(){
  createPeerConnection();
  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  socket.emit('signal', { type:'offer', offer });
}

function cleanupConnection(){
  if (peerConnection){ peerConnection.close(); peerConnection = null; }
  remoteVideo.srcObject = null;
}

function resetSocialUI(){
  chatLog.innerHTML = '';
  closeChat();
  menuDropdown.classList.remove('open');
  menuBtn.classList.add('hidden-el');
  chatToggle.classList.add('hidden-el');
  chatToggle.classList.remove('unread');
}

startBtn.onclick = async () => {
  setStatus('كنجهزو الكاميرا...','');
  const ok = await startCamera();
  if (!ok) return;
  startBtn.classList.add('hidden-el');
  controls.classList.remove('hidden');
  setStatus('كنقلبو ليك على حد...','استعد، القريب نلقالك حد');
  setPill('كنقلبو','searching');
  socket.emit('find-partner');
};

nextBtn.onclick = () => {
  cleanupConnection();
  stage.classList.remove('swapped');
  resetSocialUI();
  waitingOverlay.classList.remove('hidden');
  setStatus('كنقلبو ليك على حد جديد...','');
  setPill('كنقلبو','searching');
  socket.emit('next');
  socket.emit('find-partner');
};

endBtn.onclick = () => {
  cleanupConnection();
  stage.classList.remove('swapped');
  resetSocialUI();
  if (localStream){ localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  localVideo.srcObject = null;
  localVideo.classList.add('hidden-el');
  controls.classList.add('hidden');
  waitingOverlay.classList.remove('hidden');
  startBtn.classList.remove('hidden-el');
  setStatus('جاهز؟','دوس بدأ ونقلبولك على حد نتسناوش');
  setPill('غير متصل', null);
  socket.emit('next');
};

micBtn.onclick = () => {
  if (!localStream) return;
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  micBtn.classList.toggle('off', !micOn);
};

camBtn.onclick = () => {
  if (!localStream) return;
  camOn = !camOn;
  localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  camBtn.classList.toggle('off', !camOn);
};

localVideo.addEventListener('click', () => stage.classList.toggle('swapped'));

chatToggle.onclick = () => { chatPanel.classList.contains('open') ? closeChat() : openChat(); };
chatClose.onclick = closeChat;

chatForm.onsubmit = (e) => {
  e.preventDefault();
  const text = chatInput.value.trim();
  if (!text) return;
  socket.emit('chat-message', { text });
  chatInput.value = '';
};

menuBtn.onclick = (e) => {
  e.stopPropagation();
  menuDropdown.classList.toggle('open');
};
document.addEventListener('click', (e) => {
  if (menuDropdown.classList.contains('open') && !menuDropdown.contains(e.target) && e.target !== menuBtn){
    menuDropdown.classList.remove('open');
  }
});

function endCurrentAndResearch(){
  cleanupConnection();
  stage.classList.remove('swapped');
  resetSocialUI();
  waitingOverlay.classList.remove('hidden');
  setStatus('كنقلبو ليك على حد جديد...','');
  setPill('كنقلبو','searching');
  socket.emit('find-partner');
}

reportBtn.onclick = () => {
  socket.emit('report');
  endCurrentAndResearch();
  showToast('تم الإبلاغ، شكرا 🙏');
};

blockBtn.onclick = () => {
  socket.emit('block');
  endCurrentAndResearch();
  showToast('تم الحظر، ماغاتلاقاوش هاد الشخص مرة أخرى');
};

socket.on('waiting', () => { setStatus('فالانتظار...','قريبا نلقاو ليك حد'); });

socket.on('partner-found', async (data) => {
  waitingOverlay.classList.add('hidden');
  setPill('متصل الآن','live');
  menuBtn.classList.remove('hidden-el');
  chatToggle.classList.remove('hidden-el');
  isInitiator = data.initiator;
  if (isInitiator) await makeOffer();
});

socket.on('signal', async (data) => {
  if (data.type === 'offer'){
    createPeerConnection();
    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    socket.emit('signal', { type:'answer', answer });
  } else if (data.type === 'answer'){
    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
  } else if (data.type === 'candidate'){
    if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
  }
});

socket.on('chat-message', (data) => {
  addMessage(data.text, data.self);
  if (!data.self && !chatPanel.classList.contains('open')) chatToggle.classList.add('unread');
});

socket.on('partner-left', () => {
  cleanupConnection();
  stage.classList.remove('swapped');
  resetSocialUI();
  waitingOverlay.classList.remove('hidden');
  setStatus('الطرف الآخر خرج','كنقلبو على حد جديد...');
  setPill('كنقلبو','searching');
  socket.emit('find-partner');
});

socket.on('banned', () => {
  cleanupConnection();
  if (localStream){ localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  localVideo.srcObject = null;
  localVideo.classList.add('hidden-el');
  controls.classList.add('hidden');
  resetSocialUI();
  waitingOverlay.classList.remove('hidden');
  startBtn.classList.add('hidden-el');
  setStatus('تم تقييد الحساب','توصلنا ببلاغات متكررة عليك، ماعادش تقدر تلقى حد دابا');
  setPill('محظور', null);
});
</script>
</body>
</html>
